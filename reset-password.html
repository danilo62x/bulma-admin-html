<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <title>Redefinir senha — Admin Template</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css" />
    <link rel="stylesheet" href="assets/css/variables.css" />
    <link rel="stylesheet" href="assets/css/dark.css" />
    <link rel="stylesheet" href="assets/css/app.css" />
</head>
<body>
<div class="tx-login-page">
    <div class="tx-login-card">
        <div class="tx-login-header">
            <div class="tx-login-logo"><span class="mdi mdi-lock"></span></div>
            <h1 style="font-size: 1.4rem; font-weight: 700; margin-bottom: 0.25rem;">Redefinir senha</h1>
            <p style="opacity: 0.8; font-size: 0.875rem;">Defina uma nova senha para sua conta.</p>
        </div>

        <div class="tx-login-body">
            <div class="notification is-warning is-light has-text-centered is-size-7" id="token-warn" style="display: none;">
                Link inválido ou expirado. Solicite um novo link de redefinição.
            </div>

            <form id="reset-form" novalidate>
                <div class="field">
                    <label class="label">Nova senha</label>
                    <div class="control has-icons-left">
                        <input class="input" type="password" id="rp-password" placeholder="••••••••" autocomplete="new-password" />
                        <span class="icon is-small is-left"><i class="mdi mdi-lock"></i></span>
                    </div>
                    <p class="help">Use 8+ caracteres, com letras, números e símbolos</p>
                    <p class="help is-danger" data-error="password" style="display: none;"></p>
                </div>

                <div class="field" id="strength-wrap" style="display: none;">
                    <div class="tx-strength-bars">
                        <span class="tx-strength-bar"></span>
                        <span class="tx-strength-bar"></span>
                        <span class="tx-strength-bar"></span>
                        <span class="tx-strength-bar"></span>
                    </div>
                    <p class="is-size-7 has-text-weight-medium" id="strength-label"></p>
                </div>

                <div class="field">
                    <label class="label">Confirmar senha</label>
                    <div class="control has-icons-left">
                        <input class="input" type="password" id="rp-confirm" placeholder="••••••••" autocomplete="new-password" />
                        <span class="icon is-small is-left"><i class="mdi mdi-lock-check"></i></span>
                    </div>
                    <p class="help is-danger" data-error="confirmPassword" style="display: none;"></p>
                </div>

                <button type="submit" class="button is-primary is-fullwidth" id="reset-submit">Redefinir senha</button>
            </form>

            <p class="has-text-centered is-size-7 has-text-grey" style="margin-top: 1.5rem;">
                <a href="login.html" style="color: var(--tx-primary); font-weight: 500;">Voltar — Entrar</a>
            </p>
        </div>
    </div>
</div>

<script src="assets/js/state.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/i18n.js"></script>
<script src="assets/js/pwa.js"></script>
<script>
    var params = new URLSearchParams(window.location.search);
    var token = params.get('token') || '';
    if (!token) document.getElementById('token-warn').style.display = 'block';

    var form = document.getElementById('reset-form');
    var pwdEl = document.getElementById('rp-password');
    var confirmEl = document.getElementById('rp-confirm');
    var submitBtn = document.getElementById('reset-submit');
    var strengthWrap = document.getElementById('strength-wrap');
    var strengthLabel = document.getElementById('strength-label');
    var bars = strengthWrap.querySelectorAll('.tx-strength-bar');

    var STRENGTH = [
        { label: 'Muito fraca', color: 'is-danger', text: 'has-text-danger' },
        { label: 'Fraca', color: 'is-danger', text: 'has-text-danger' },
        { label: 'Razoável', color: 'is-warning', text: 'has-text-warning-dark' },
        { label: 'Boa', color: 'is-success', text: 'has-text-success' },
        { label: 'Forte', color: 'is-success', text: 'has-text-success' },
    ];

    function score(pw) {
        var s = 0;
        if (pw.length >= 8) s++;
        if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) s++;
        if (/\d/.test(pw)) s++;
        if (/[^A-Za-z0-9]/.test(pw)) s++;
        return s;
    }

    pwdEl.addEventListener('input', function () {
        var pw = pwdEl.value;
        if (!pw) { strengthWrap.style.display = 'none'; return; }
        strengthWrap.style.display = 'block';
        var sc = score(pw);
        var st = STRENGTH[sc];
        bars.forEach(function (bar, i) {
            bar.className = 'tx-strength-bar' + (i < sc ? ' ' + st.color : '');
        });
        strengthLabel.className = 'is-size-7 has-text-weight-medium ' + st.text;
        strengthLabel.textContent = 'Força da senha: ' + st.label;
    });

    function setError(field, msg) {
        var el = document.querySelector('[data-error="' + field + '"]');
        if (!el) return;
        if (msg) { el.textContent = msg; el.style.display = 'block'; }
        else { el.textContent = ''; el.style.display = 'none'; }
    }

    form.addEventListener('submit', async function (e) {
        e.preventDefault();
        var pw = pwdEl.value, confirm = confirmEl.value, ok = true;
        if (!pw) { setError('password', 'Informe uma senha'); ok = false; }
        else if (pw.length < 8) { setError('password', 'A senha deve ter ao menos 8 caracteres'); ok = false; }
        else setError('password', null);
        if (!confirm) { setError('confirmPassword', 'Confirme sua senha'); ok = false; }
        else if (confirm !== pw) { setError('confirmPassword', 'As senhas não conferem'); ok = false; }
        else setError('confirmPassword', null);
        if (!ok) return;
        submitBtn.classList.add('is-loading');
        submitBtn.disabled = true;
        await new Promise(function (r) { setTimeout(r, 700); });
        window.location.href = 'login.html';
    });
</script>
</body>
</html>
