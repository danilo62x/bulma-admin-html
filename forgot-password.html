<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <title>Esqueci a senha — Admin Template</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css" />
    <link rel="stylesheet" href="assets/css/variables.css" />
    <link rel="stylesheet" href="assets/css/dark.css" />
    <link rel="stylesheet" href="assets/css/app.css" />
</head>
<body>
<div class="tx-login-page">
    <div class="tx-login-card">
        <div class="tx-login-header">
            <div class="tx-login-logo"><span class="mdi mdi-lock"></span></div>
            <h1 style="font-size: 1.4rem; font-weight: 700; margin-bottom: 0.25rem;">Esqueci a senha</h1>
            <p style="opacity: 0.8; font-size: 0.875rem;">Informe seu e-mail e enviaremos um link para redefinir sua senha.</p>
        </div>

        <div class="tx-login-body">
            <div id="sent-state" style="display: none; text-align: center;">
                <span class="icon is-large has-text-success"><span class="mdi mdi-check-circle mdi-48px"></span></span>
                <h2 class="title is-6" style="margin-top: 0.75rem;">Link enviado para seu e-mail</h2>
                <p class="is-size-7 has-text-grey">
                    Enviamos um link de redefinição para
                    <span class="has-text-weight-medium has-text-dark" id="sent-email"></span>. Verifique sua caixa de entrada e o spam.
                </p>
                <div class="notification is-light is-size-7" style="margin-top: 1rem;">
                    Não recebeu?
                    <a class="has-text-weight-medium" id="retry-link">Tentar outro e-mail</a>
                </div>
            </div>

            <form id="forgot-form" novalidate>
                <div class="field">
                    <label class="label">E-mail</label>
                    <div class="control has-icons-left">
                        <input class="input" type="email" id="f-email" placeholder="seu@email.com" autocomplete="email" />
                        <span class="icon is-small is-left"><i class="mdi mdi-email"></i></span>
                    </div>
                    <p class="help is-danger" id="f-error" style="display: none;"></p>
                </div>
                <button type="submit" class="button is-primary is-fullwidth" id="forgot-submit">Enviar link de redefinição</button>
            </form>

            <p class="has-text-centered is-size-7 has-text-grey" style="margin-top: 1.5rem;">
                <a href="login.html" style="color: var(--tx-primary); font-weight: 500;">Voltar — Entrar</a>
            </p>
        </div>
    </div>
</div>

<script src="assets/js/state.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/i18n.js"></script>
<script src="assets/js/pwa.js"></script>
<script>
    var form = document.getElementById('forgot-form');
    var emailEl = document.getElementById('f-email');
    var errEl = document.getElementById('f-error');
    var submitBtn = document.getElementById('forgot-submit');
    var sentState = document.getElementById('sent-state');

    document.getElementById('retry-link').addEventListener('click', function () {
        sentState.style.display = 'none';
        form.style.display = 'block';
        emailEl.value = '';
    });

    form.addEventListener('submit', async function (e) {
        e.preventDefault();
        errEl.style.display = 'none';
        emailEl.classList.remove('is-danger');
        var email = emailEl.value.trim();
        if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
            errEl.textContent = 'E-mail inválido';
            errEl.style.display = 'block';
            emailEl.classList.add('is-danger');
            return;
        }
        submitBtn.classList.add('is-loading');
        submitBtn.disabled = true;
        await new Promise(function (r) { setTimeout(r, 700); });
        submitBtn.classList.remove('is-loading');
        submitBtn.disabled = false;
        document.getElementById('sent-email').textContent = email;
        form.style.display = 'none';
        sentState.style.display = 'block';
    });
</script>
</body>
</html>
