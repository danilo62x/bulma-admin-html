<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <title>Em manutenção — Admin Template</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css" />
    <link rel="stylesheet" href="assets/css/variables.css" />
    <link rel="stylesheet" href="assets/css/dark.css" />
    <link rel="stylesheet" href="assets/css/app.css" />
</head>
<body>
<div class="tx-state-page">
    <div class="tx-state-bg">
        <span class="tx-state-blob tx-state-blob--one"></span>
        <span class="tx-state-blob tx-state-blob--two"></span>
    </div>

    <div class="tx-state-content has-text-centered">
        <span class="tx-state-icon"><span class="mdi mdi-cog"></span></span>
        <h1 class="title is-2 has-text-white" style="margin-top: 1.25rem;">Estamos em manutenção</h1>
        <p class="subtitle is-6 tx-state-text" style="margin-top: 0.75rem;">
            Nosso sistema está passando por uma atualização programada para melhorar sua experiência.
            Voltaremos em instantes. Agradecemos a sua paciência.
        </p>
        <div style="margin-top: 1rem;">
            <span class="tx-state-badge">
                <span class="tx-state-pulse"></span>
                Tempo estimado: aproximadamente 2 horas
            </span>
        </div>
        <div style="margin-top: 1.5rem;">
            <a href="index.html" class="button is-primary is-medium">
                <span class="icon"><span class="mdi mdi-arrow-left"></span></span>
                <span>Voltar ao início</span>
            </a>
        </div>
    </div>
</div>

<script src="assets/js/state.js"></script>
<script src="assets/js/pwa.js"></script>
</body>
</html>
