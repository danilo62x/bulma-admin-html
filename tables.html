<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <title>Tabelas — Admin Template</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css" />
    <link rel="stylesheet" href="assets/css/variables.css" />
    <link rel="stylesheet" href="assets/css/dark.css" />
    <link rel="stylesheet" href="assets/css/app.css" />
</head>
<body>
<div class="tx-layout">
    <aside class="tx-sidebar" id="tx-sidebar"></aside>
    <div class="tx-backdrop" id="tx-backdrop"></div>
    <div class="tx-main" id="tx-main">
        <header class="tx-header" id="tx-header"></header>
        <main class="tx-content">

            <div class="tx-card">
                <div class="tx-card-header">
                    <span class="mdi tx-card-header-icon mdi-account-group"></span>
                    <span class="tx-card-title">Gerenciamento de Usuários</span>
                    <div class="tx-table-toolbar">
                        <div class="tx-table-search"><div class="control has-icons-left"><input class="input is-small" id="user-search" placeholder="Buscar..." /><span class="icon is-small is-left"><i class="mdi mdi-magnify"></i></span></div></div>
                        <button class="button is-small is-primary" id="open-add"><span class="mdi mdi-plus" style="margin-right:0.25rem;"></span>Novo</button>
                    </div>
                </div>
                <div class="tx-card-body">
                    <div id="bulk-bar" class="tx-bulk-bar" style="display:none;">
                        <span class="tx-bulk-count"><span class="mdi mdi-checkbox-multiple-marked"></span> <span id="bulk-count">0</span> selecionados</span>
                        <button class="button is-small is-danger is-outlined" id="bulk-delete"><span class="mdi mdi-delete" style="margin-right:0.25rem;"></span>Excluir selecionados</button>
                        <button class="button is-small is-light" id="bulk-clear"><span class="mdi mdi-close" style="margin-right:0.25rem;"></span>Limpar seleção</button>
                    </div>

                    <div class="table-container">
                        <table class="table is-fullwidth is-striped is-hoverable">
                            <thead>
                                <tr>
                                    <th><input type="checkbox" id="check-all" /></th>
                                    <th data-sort="id" style="cursor:pointer;">#</th>
                                    <th data-sort="name" style="cursor:pointer;">Nome</th>
                                    <th data-sort="email" style="cursor:pointer;">E-mail</th>
                                    <th data-sort="role" style="cursor:pointer;">Perfil</th>
                                    <th class="has-text-centered">Status</th>
                                    <th>Cadastro</th>
                                    <th class="has-text-centered">Ações</th>
                                </tr>
                            </thead>
                            <tbody id="users-tbody"></tbody>
                        </table>
                    </div>

                    <div class="tx-table-footer">
                        <span class="tx-table-count" id="users-count"></span>
                        <div class="field" style="margin: 0;"><div class="select is-small"><select id="per-page"><option value="5">5 por página</option><option value="10" selected>10 por página</option><option value="20">20 por página</option></select></div></div>
                        <nav class="pagination is-small" id="pagination"></nav>
                    </div>
                </div>
            </div>

            <!-- Modal usuário -->
            <div id="modal-user" class="modal">
                <div class="modal-background" data-close-modal="modal-user"></div>
                <div class="modal-card" style="width: 480px; max-width: 100%;">
                    <header class="modal-card-head"><p class="modal-card-title" id="modal-user-title">Novo Usuário</p><button class="delete" data-close-modal="modal-user"></button></header>
                    <section class="modal-card-body">
                        <div class="field"><label class="label">Nome</label><div class="control has-icons-left"><input class="input" id="uf-name" /><span class="icon is-small is-left"><i class="mdi mdi-account"></i></span></div></div>
                        <div class="field"><label class="label">E-mail</label><div class="control has-icons-left"><input class="input" type="email" id="uf-email" /><span class="icon is-small is-left"><i class="mdi mdi-email"></i></span></div></div>
                        <div class="field"><label class="label">Telefone</label><div class="control has-icons-left"><input class="input" id="uf-phone" /><span class="icon is-small is-left"><i class="mdi mdi-phone"></i></span></div></div>
                        <div class="field"><label class="label">Perfil</label><div class="control has-icons-left"><div class="select is-fullwidth"><select id="uf-role"><option>Administrador</option><option>Gerente</option><option>Operador</option><option>Visualizador</option></select></div><span class="icon is-small is-left"><i class="mdi mdi-account-cog"></i></span></div></div>
                        <div class="field"><label class="label">Status</label><label class="tx-switch is-success"><input type="checkbox" id="uf-active" checked /><span class="tx-switch-track"><span class="tx-switch-thumb"></span></span><span class="tx-switch-label" id="uf-active-label">Ativo</span></label></div>
                    </section>
                    <footer class="modal-card-foot tx-modal-foot"><button class="button" data-close-modal="modal-user">Cancelar</button><button class="button is-primary" id="uf-save"><span class="mdi mdi-content-save" style="margin-right:0.25rem;"></span>Salvar</button></footer>
                </div>
            </div>

            <!-- Modal delete -->
            <div id="modal-delete" class="modal">
                <div class="modal-background" data-close-modal="modal-delete"></div>
                <div class="modal-card" style="width: 400px; max-width: 100%;">
                    <header class="modal-card-head"><p class="modal-card-title">Confirmar exclusão</p></header>
                    <section class="modal-card-body">
                        <div style="display: flex; align-items: flex-start; gap: 1rem;">
                            <span class="mdi mdi-alert-circle" style="font-size: 2rem; color: var(--tx-danger); flex-shrink: 0;"></span>
                            <div>
                                <p style="font-size: 0.9rem; font-weight: 600; color: var(--tx-text-heading);">Excluir "<span id="del-name"></span>"?</p>
                                <p style="font-size: 0.875rem; color: var(--tx-text-muted); margin-top: 0.5rem;">Esta ação não pode ser desfeita.</p>
                            </div>
                        </div>
                    </section>
                    <footer class="modal-card-foot tx-modal-foot"><button class="button" data-close-modal="modal-delete">Cancelar</button><button class="button is-danger" id="confirm-delete"><span class="mdi mdi-delete" style="margin-right:0.25rem;"></span>Excluir</button></footer>
                </div>
            </div>

        </main>
        <footer class="tx-footer" id="tx-footer" style="padding: 0.75rem 1.25rem; border-top: 1px solid var(--tx-border); text-align: center; font-size: 0.78rem; color: var(--tx-text-muted); background: var(--tx-card-bg);"></footer>
    </div>
    <div class="tx-notifications" id="tx-notifications"></div>
    <div class="tx-cookie-banner" id="tx-cookie-banner" style="display:none;"></div>
</div>

<script src="assets/js/state.js"></script>
<script src="assets/js/menu.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/layout.js"></script>
<script src="assets/js/pages/tables.js"></script>
</body>
</html>
